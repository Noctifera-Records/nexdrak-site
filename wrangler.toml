name = "nex-website"
pages_build_output_dir = ".open-next/assets"
compatibility_date = "2024-11-18"
compatibility_flags = ["nodejs_compat"]

# No usamos [assets] con binding "ASSETS" porque Pages lo reserva
# Solo definimos el directorio de salida para que Wrangler lo sepa
[site]
bucket = ".open-next/assets"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "nex-website"
